version: '3.8'
services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: nabora-postgres
    environment:
      POSTGRES_USER: nabora
      POSTGRES_PASSWORD: nabora123
      POSTGRES_DB: nabora
    ports:
      - '5432:5432'
    volumes:
      - nabora_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: nabora-redis
    ports:
      - '6379:6379'

volumes:
  nabora_pg_data:
